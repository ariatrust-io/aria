<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Unbounded:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:       oklch(98% 0.003 150);
      --paper-shade: oklch(95.5% 0.006 150);
      --ink:         oklch(24% 0.015 160);
      --ink-soft:    oklch(42% 0.015 160);
      --ink-faint:   oklch(55% 0.012 160);
      --green:       oklch(38% 0.085 155);
      --green-deep:  oklch(31% 0.07 155);
      --green-wash:  oklch(94% 0.02 155);
      --red:         oklch(46% 0.16 27);
      --red-wash:    oklch(94% 0.025 27);
      --rule:        oklch(86% 0.01 150);
      --rule-strong: oklch(70% 0.012 150);
      --on-green:    oklch(98% 0.005 150);
      --font-sans: 'Archivo', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--paper-shade);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    ::selection { background: var(--green); color: var(--on-green); }

    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--rule-strong);
      border-radius: 4px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {font-family:'Unbounded','Archivo',sans-serif;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size:15px;
      letter-spacing:0.02em;
      color: var(--ink);
      margin-bottom: 28px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      text-wrap: balance;
    }

    .subtitle {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--paper);
      border: 1px solid var(--rule-strong);
      border-radius: 3px;
      color: var(--ink);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]::placeholder { color: var(--ink-soft); }

    input[type="password"]:focus {
      border-color: var(--green);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: var(--on-green);
      border: none;
      border-radius: 3px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.15s;
    }

    .btn:hover:not(:disabled) { background: var(--green-deep); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 3px;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
      font-weight: 500;
    }

    .alert-error {
      background: var(--red-wash);
      border: 1px solid color-mix(in oklch, var(--red) 30%, var(--paper));
      color: var(--red);
    }

    .alert-success {
      background: var(--green-wash);
      border: 1px solid color-mix(in oklch, var(--green) 30%, var(--paper));
      color: var(--green);
    }

    .hidden { display: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }

    @media (prefers-reduced-motion: reduce) {
      input[type="password"], .btn, .back-link { transition: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      ARIA
    </div>
    <h1>Set a new password</h1>
    <p class="subtitle">Enter your new password below. You will be logged out of all sessions.</p>

    <div id="alert" class="alert hidden"></div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat new password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submit-btn">Reset Password</button>
    </form>

    <a href="/app" class="back-link">← Back to sign in</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showAlert('error', 'Invalid reset link. Please request a new one.');
      document.getElementById('reset-form').style.display = 'none';
    }

    function showAlert(type, message) {
      const el = document.getElementById('alert');
      el.className = 'alert alert-' + type;
      el.textContent = message;
    }

    async function handleReset(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        showAlert('error', 'Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('success', 'Password updated successfully. Redirecting to sign in…');
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => { window.location.href = '/app'; }, 2500);
        } else {
          showAlert('error', data.error || 'Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch {
        showAlert('error', 'Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
