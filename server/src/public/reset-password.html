<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:  #04060d;
      --gold:   #c9a84c;
      --white:  #f8f4ee;
      --muted:  rgba(248,244,238,0.45);
      --error:  #c94c4c;
      --success:#28c841;
      --border: rgba(255,255,255,0.08);
      --surface:#07090f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--white);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: rgba(201,168,76,0.4);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      color: #04060d;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .alert-error {
      background: rgba(201,76,76,0.1);
      border: 1px solid rgba(201,76,76,0.3);
      color: #e88a8a;
    }

    .alert-success {
      background: rgba(40,200,65,0.1);
      border: 1px solid rgba(40,200,65,0.3);
      color: #5de070;
    }

    .hidden { display: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ARIA</div>
    <h1>Set a new password</h1>
    <p class="subtitle">Enter your new password below. You will be logged out of all sessions.</p>

    <div id="alert" class="alert hidden"></div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label>New password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat new password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submit-btn">Reset Password</button>
    </form>

    <a href="/app" class="back-link">← Back to sign in</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showAlert('error', 'Invalid reset link. Please request a new one.');
      document.getElementById('reset-form').style.display = 'none';
    }

    function showAlert(type, message) {
      const el = document.getElementById('alert');
      el.className = 'alert alert-' + type;
      el.textContent = message;
    }

    async function handleReset(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        showAlert('error', 'Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('success', 'Password updated successfully. Redirecting to sign in…');
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => { window.location.href = '/app'; }, 2500);
        } else {
          showAlert('error', data.error || 'Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch {
        showAlert('error', 'Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
